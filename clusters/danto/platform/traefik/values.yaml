ingressClass:
  enabled: true
  isDefaultClass: false
  name: traefik

providers:
  kubernetesCRD:
    allowCrossNamespace: true
    ingressClass: traefik
  kubernetesIngress:
    ingressClass: traefik

ports:
  traefik:
    expose:
      default: false
  web: null
  websecure:
    asDefault: true
    expose:
      default: true
  hypersnap-gossip:
    port: 3382
    exposedPort: 3382
    protocol: UDP
    expose:
      default: true
  hypersnap-grpc:
    port: 3383
    exposedPort: 3383
    protocol: TCP
    expose:
      default: true

service:
  type: LoadBalancer

certificatesResolvers:
  le:
    acme:
      email: admin@x43.io
      storage: /data/acme.json
      tlsChallenge: true

persistence:
  enabled: true
  path: /data
