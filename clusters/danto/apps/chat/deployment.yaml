apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: chat
  template:
    metadata:
      labels:
        app: chat
    spec:
      securityContext:
        fsGroup: 2000
      initContainers:
        - name: prepare-data
          image: alpine:3.20
          command:
            - /bin/sh
            - -c
            - mkdir -p /mattermost/config /mattermost/data /mattermost/logs /mattermost/plugins /mattermost/client/plugins /mattermost/bleve-indexes && chown -R 2000:2000 /mattermost
          volumeMounts:
            - name: data
              mountPath: /mattermost
      containers:
        - name: mattermost
          image: mattermost/mattermost-team-edition:11.7.0
          securityContext:
            runAsUser: 2000
            runAsGroup: 2000
          env:
            - name: MM_SERVICESETTINGS_SITEURL
              value: "https://chat.x43.io"
            - name: MM_SERVICESETTINGS_LISTENADDRESS
              value: ":8065"
            - name: MM_SERVICESETTINGS_TRUSTEDPROXYIPHEADER
              value: X-Forwarded-For
            - name: MM_SQLSETTINGS_DRIVERNAME
              value: postgres
            - name: MM_POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: chat-secrets
                  key: postgres-password
            - name: MM_SQLSETTINGS_DATASOURCE
              value: "postgres://mattermost:$(MM_POSTGRES_PASSWORD)@chat-db:5432/mattermost?sslmode=disable&connect_timeout=10"
            - name: MM_FILESETTINGS_DIRECTORY
              value: /mattermost/data
            - name: MM_PLUGINSETTINGS_DIRECTORY
              value: /mattermost/plugins
            - name: MM_PLUGINSETTINGS_CLIENTDIRECTORY
              value: /mattermost/client/plugins
            - name: MM_BLEVESETTINGS_INDEXDIR
              value: /mattermost/bleve-indexes
            - name: MM_EMAILSETTINGS_SENDEMAILNOTIFICATIONS
              value: "false"
            - name: MM_EMAILSETTINGS_ENABLESIGNUPWITHEMAIL
              value: "true"
            - name: MM_TEAMSETTINGS_ENABLEOPENSERVER
              value: "true"
            - name: MM_SUPPORTSETTINGS_SUPPORTEMAIL
              value: admin@x43.io
          ports:
            - name: http
              containerPort: 8065
          readinessProbe:
            httpGet:
              path: /api/v4/system/ping
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v4/system/ping
              port: http
            initialDelaySeconds: 120
            periodSeconds: 20
          volumeMounts:
            - name: data
              mountPath: /mattermost/config
              subPath: config
            - name: data
              mountPath: /mattermost/data
              subPath: data
            - name: data
              mountPath: /mattermost/logs
              subPath: logs
            - name: data
              mountPath: /mattermost/plugins
              subPath: plugins
            - name: data
              mountPath: /mattermost/client/plugins
              subPath: client/plugins
            - name: data
              mountPath: /mattermost/bleve-indexes
              subPath: bleve-indexes
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: chat-data
